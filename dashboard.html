<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Locus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-container">
    <h1>Dashboard</h1>
    <p>Bem-vindo ao sistema</p>

    <h2>Consulta de Convênios</h2>

    <label for="selectEmpresa">Empresa:</label>
    <select id="selectEmpresa">
      <option value="">Selecione a empresa</option>
    </select>

    <label for="selectConvenio">Convênio:</label>
    <select id="selectConvenio" disabled>
      <option value="">Selecione o convênio</option>
    </select>

    <div id="dadosConvenio" style="margin-top:20px;"></div>

    <button onclick="logout()">Sair</button>
  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CONEXÃO -->
  <script src="js/supabase.js"></script>

  <!-- DASHBOARD -->
  <script src="js/dashboard.js"></script>

</body>
</html>
