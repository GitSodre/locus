<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Locus</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

  <div class="dashboard-container">

    <h2>Consulta de convênios</h2>

    <div class="filtros-linha">
      <div class="filtro">
        <label>Empresa</label>
        <select id="selectEmpresa">
          <option value="">Selecione a empresa</option>
        </select>
      </div>

      <div class="filtro">
        <label>Convênio</label>
        <select id="selectConvenio" disabled>
          <option value="">Selecione o convênio</option>
        </select>
      </div>
    </div>

    <hr>

    <div class="dados-convenio">
      <p><strong>Empresa:</strong> <span id="outEmpresa">—</span></p>
      <p><strong>Convênio:</strong> <span id="outConvenio">—</span></p>

      <p>
        <strong>Link:</strong>
        <!-- Sem href por padrão; JS ativa quando houver URL -->
        <a id="outLink" target="_blank" rel="noopener noreferrer">—</a>
        <!-- aparece só quando houver link -->
        <button class="btn-copy" id="copyLink" aria-label="Copiar link" title="Copiar link" hidden>📋</button>
      </p>

      <p>
        <strong>Login:</strong> <span id="outLogin">—</span>
        <!-- aparece só quando houver login -->
        <button class="btn-copy" id="copyLogin" aria-label="Copiar login" title="Copiar login" hidden>📋</button>
      </p>

      <p>
        <strong>Senha:</strong> <span id="outSenha">—</span>
        <!-- aparece só quando houver senha -->
        <button class="btn-copy" id="copySenha" aria-label="Copiar senha" title="Copiar senha" hidden>📋</button>
      </p>

      <p><strong>Observação:</strong> <span id="outObservacao">—</span></p>
    </div>

    <div class="caixa_botoes">
      <button id="btnChamado" class="btn-verde" disabled>
        Solicitar alteração de senha
      </button>
      <button class="btn-vermelho" onclick="logout()">Sair</button>
    </div>

  </div>

  <!-- LIBS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
