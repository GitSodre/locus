<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Locus</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">

  <div class="dashboard-container">

    <h2>Consulta de convênios</h2>

    <div class="filtros-linha">
      <div class="filtro">
        <label>Empresa</label>
        <select id="selectEmpresa">
          <option value="">Selecione a empresa</option>
        </select>
      </div>

      <div class="filtro">
        <label>Convênio</label>
        <select id="selectConvenio" disabled>
          <option value="">Selecione o convênio</option>
        </select>
      </div>
    </div>

    <hr>

    <div class="dados-convenio">
      <p><strong>Empresa:</strong> <span id="outEmpresa">—</span></p>
      <p><strong>Convênio:</strong> <span id="outConvenio">—</span></p>
      <p><strong>Link:</strong> <span id="outLink">—</span></p>
      <p><strong>Login:</strong> <span id="outLogin">—</span></p>
      <p><strong>Senha:</strong> <span id="outSenha">—</span></p>
    </div>

    <button id="btnChamado" class="btn-verde" disabled>
      Solicitar alteração de senha
    </button>

    <button onclick="logout()" class="btn-vermelho">
      Sair
    </button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
